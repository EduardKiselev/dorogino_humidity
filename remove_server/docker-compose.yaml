services:
  db:
    image: postgres:15-alpine
    container_name: postgres_server
    command: [
      "postgres",
      "-c", "log_connections=on",
      "-c", "log_line_prefix=%m [%p] %q%h %u %a "
    ]
    environment:
      POSTGRES_DB: ${DB_NAME:-sensor_data}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:  # ← полезно для контроля состояния БД
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: flask_collector
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy  # ← ждём готовности БД
    networks:
      - app_network
    environment:
      - TZ=Asia/Novosibirsk
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sensor_data}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-asd}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: flask_front
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
      collector:
        condition: service_started
    networks:
      - app_network
    environment:
      - TZ=Asia/Novosibirsk
      - PYTHONUNBUFFERED=1
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sensor_data}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DEBUG=${DEBUG:-False}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-trololo}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
    volumes:
      - /root/screen:/root/screen:ro
    restart: unless-stopped

  worker:
    build:
      context: ./kiln_parser
      dockerfile: Dockerfile
    container_name: screen_worker
    volumes:
      - /root/screen:/root/screen:ro
    environment:
      - TZ=Asia/Novosibirsk
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-sensor_data}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'python.*worker.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    build: ./nginx
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs
      - /var/log/myapp/nginx:/var/log/nginx:rw
      - ./certbot/www:/var/www/certbot
    extra_hosts:
      - "host-gateway:host-gateway" 
    depends_on:
      - front
      - collector
    networks:
      - app_network
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: certbot_service
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
      trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot;
        sleep 12h & wait $${!};
      done;
      "
    restart: unless-stopped  # ← добавлено

  migrate:
    build:
      context: ./migrate
      dockerfile: Dockerfile
    container_name: db_migrator
    depends_on:
      db:
        condition: service_healthy  # ← ждём готовности БД перед миграцией
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-sensor_data}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    networks:
      - app_network
    volumes:
      - ./migrations:/app/migrations
    command: ["python", "migrate.py", "apply"]
    restart: on-failure:5  # ← перезапуск только при ошибке, макс. 5 попыток

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge