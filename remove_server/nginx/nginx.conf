events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log  warn;

    sendfile        on;
    keepalive_timeout  65;

    # ============================================
    # HTTP → HTTPS редирект
    # ============================================
    server {
        listen 80;
        listen [::]:80;
        server_name dorogino-ceramics.ru www.dorogino-ceramics.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri $uri/ =404;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================================
    # HTTPS сервер
    # ============================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        
        server_name dorogino-ceramics.ru www.dorogino-ceramics.ru;

        ssl_certificate /etc/nginx/certs/live/dorogino-ceramics.ru/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/dorogino-ceramics.ru/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000" always;

        access_log /var/log/nginx/ssl-access.log;
        error_log /var/log/nginx/ssl-error.log;

        # ========================================
        # Django OTK (ОТДЕЛЬНЫЙ проект!)
        # Доступ через ХОСТ: порт 8001
        # ========================================
        location /otk/ {
            proxy_pass http://host-gateway:8001;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # ========================================
        # Django OTK - статика
        # ========================================
        location /otk-static/ {
            proxy_pass http://host-gateway:8001/otk-static/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Кэширование статики
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ========================================
        # Collector (В ЭТОМ ЖЕ compose!)
        # Доступ по имени сервиса в сети
        # ========================================
        location /data {
            proxy_pass http://collector:5000;  # ← Имя сервиса, та же сеть!
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================
        # Фронтенд (В ЭТОМ ЖЕ compose!)
        # Доступ по имени сервиса в сети
        # ========================================
        location / {
            proxy_pass http://front:5000;  # ← Имя сервиса, та же сеть!
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}