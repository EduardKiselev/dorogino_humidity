<script>
    // Time slider functionality
    document.addEventListener('DOMContentLoaded', function() {
        // Wait for all elements to be available in DOM
        const timeSlider = document.getElementById('timeSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        const labelsContainer = document.getElementById('sliderLabelsContainer');
        
        // Check if all required elements exist before proceeding
        if (!timeSlider || !timeDisplay || !labelsContainer) {
            console.error('Required slider elements not found in the DOM');
            return;
        }
        
        // Set slider range to cover 24 hours (1440 minutes)
        timeSlider.min = 0;
        timeSlider.max = 1440; // 24 hours in minutes
        timeSlider.value = 0; // Default to showing most recent time (right side)
        
        // Generate hourly labels
        const now = new Date();
        for (let i = 0; i <= 24; i++) {
            const labelTime = new Date(now);
            labelTime.setHours(now.getHours() - i); // Going backwards in time
            
            const label = document.createElement('span');
            label.textContent = labelTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            // Position labels based on percentage across the container
            label.style.width = '4%'; // Each label gets about 4% of space (100%/24 ~ 4.17%)
            label.style.textAlign = 'center';
            label.style.display = 'inline-block';
            
            labelsContainer.appendChild(label);
        }
        
        // Update display with current time initially
        updateTimeDisplay(new Date());
        
        timeSlider.addEventListener('input', function() {
            // Calculate the time based on slider position (each unit represents 1 minute back)
            const currentValue = parseInt(timeSlider.value);
            
            // For reverse operation: higher slider value = more recent time
            // So we subtract the slider value from the max to get minutes back
            const minutesBack = 1440 - currentValue;
            
            const selectedTime = new Date();
            selectedTime.setMinutes(selectedTime.getMinutes() - minutesBack);
            
            updateTimeDisplay(selectedTime);
            
            // Fetch sensor data for the selected time
            fetchSensorDataForTime(selectedTime);
        });
        
        function updateTimeDisplay(time) {
            // Convert time to local display format accounting for GMT+7 offset
            const localTime = new Date(time.getTime() - 7*60*60*1000); // Adjust for GMT+7
            timeDisplay.textContent = localTime.toLocaleString();
        }
        
        function fetchSensorDataForTime(time) {
            // Format time as ISO string for API request
            // Convert local JS time to GMT+7 before sending to API
            const gmt7Time = new Date(time.getTime() + 7*60*60*1000); // Convert to GMT+7
            const timeStr = gmt7Time.toISOString();
            
            fetch(`/api/sensor-readings-by-time?time=${encodeURIComponent(timeStr)}`)
                .then(response => response.json())
                .then(data => updateDiagramWithData(data))
                .catch(error => console.error('Error fetching sensor data:', error));
        }
        
        function updateDiagramWithData(sensors) {
            // Clear existing sensor markers
            document.querySelectorAll('.sensor-marker').forEach(marker => marker.remove());
            
            // Add new markers based on the fetched data
            sensors.forEach(sensor => {
                const marker = document.createElement('div');
                marker.className = 'sensor-marker';
                marker.dataset.sensorId = sensor.sensor_id;
                marker.style.cssText = `position: absolute; left: ${sensor.x}%; top: ${sensor.y}%; transform: translate(-50%, -50%); cursor: pointer;`;
                marker.title = sensor.description;
                
                marker.innerHTML = `
                    <div class="sensor-info-card" style="background: white; padding: 4px; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.2); border: 1px solid #007bff; font-size: 0.8em;">
                        <strong>Sensor ${sensor.sensor_id}</strong><br>
                        T: ${sensor.temperature ? sensor.temperature.toFixed(1) + '°C' : 'No data'}<br>
                        H: ${sensor.humidity ? sensor.humidity.toFixed(1) + '%' : 'No data'}
                    </div>
                `;
                
                document.getElementById('diagram-container').appendChild(marker);
            });
        }
    });
</script>
