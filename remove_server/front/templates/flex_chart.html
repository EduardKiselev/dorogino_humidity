{% extends "base.html" %}
{% block title %}Гибкий график{% endblock %}
{% block content %}
<div class="card mb-3">
  <div class="card-body">
    <form id="chartForm" class="row g-3">
      <div class="col-md-3">
        <label class="form-label">С даты</label>
        <input type="datetime-local" class="form-control" name="date_from" id="dateFrom" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">По дату</label>
        <input type="datetime-local" class="form-control" name="date_to" id="dateTo" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Сенсоры</label>
        <div class="border rounded p-2" style="max-height:100px;overflow-y:auto">
          {% for sid in sensor_ids %}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="sensors" value="{{ sid }}" id="sen{{ sid }}" checked>
            <label class="form-check-label" for="sen{{ sid }}">Датчик {{ sid }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Метрики</label>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="metrics" value="temperature" id="metTemp" checked>
          <label class="form-check-label" for="metTemp">Температура</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="metrics" value="humidity" id="metHum" checked>
          <label class="form-check-label" for="metHum">Влажность</label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Построить</button>
        <button type="button" class="btn btn-outline-secondary" id="btnExport">Экспорт CSV</button>
      </div>
    </form>
  </div>
</div>
<canvas id="flexChart" style="height: 500px; width: 100%;"></canvas>
{% endblock %}


{% block extra_js %}
<!-- Chart.js + адаптер для времени + luxon -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>

<script>
const ctx = document.getElementById('flexChart');
let chart = null;
const colors = ['#e41a1c','#377eb8','#4daf4a','#984ea3','#ff7f00','#ffff33','#a65628','#f781bf'];

function buildChart(data, sensors, metrics) {
    console.log('Building chart:', {dataCount: data.length, sensors, metrics});
    
    if (chart) {
        chart.destroy();
        console.log('Previous chart destroyed');
    }
    
    const datasets = [];
    let colorIdx = 0;
    
    sensors.forEach(sid => {
        const sensorData = data.filter(d => d.sensor_id == sid);
        console.log(`Sensor ${sid}: ${sensorData.length} points`);
        
        metrics.forEach(metric => {
            const points = sensorData
                .filter(d => d[metric] !== null && d[metric] !== undefined)
                .map(d => ({
                    x: d.timestamp,  // ISO string, luxon разберёт
                    y: +d[metric]    // гарантируем число
                }));
            
            if (points.length) {
                const label = `Д${sid} ${metric === 'temperature' ? '🌡️' : '💧'}`;
                datasets.push({
                    label,
                    data: points,
                    borderColor: colors[colorIdx % colors.length],
                    backgroundColor: colors[colorIdx % colors.length] + '20',
                    tension: 0.3,
                    pointRadius: 1,
                    yAxisID: metric === 'temperature' ? 'yTemp' : 'yHum'
                });
                colorIdx++;
            }
        });
    });
    
    console.log(`Creating chart with ${datasets.length} datasets`);
    
    if (datasets.length === 0) {
        alert('Нет данных для отображения. Проверьте фильтры.');
        return;
    }
    
    chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: { 
                    type: 'time', 
                    time: { unit: 'hour', tooltipFormat: 'dd.MM HH:mm' }, 
                    title: { display: true, text: 'Время' } 
                },
                yTemp: { 
                    type: 'linear', 
                    display: datasets.some(d => d.yAxisID === 'yTemp'), 
                    position: 'left', 
                    title: { display: true, text: 'Температура, °C' }, 
                    grid: { drawOnChartArea: false } 
                },
                yHum: { 
                    type: 'linear', 
                    display: datasets.some(d => d.yAxisID === 'yHum'), 
                    position: 'right', 
                    title: { display: true, text: 'Влажность, %' }, 
                    min: 0, max: 100 
                }
            },
            plugins: { 
                legend: { position: 'bottom', labels: { usePointStyle: true } },
                tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}` } }
            }
        }
    });
    console.log('Chart created successfully');
}

async function fetchData() {
    const form = document.getElementById('chartForm');
    const params = new URLSearchParams(new FormData(form));
    console.log('Fetching data with params:', params.toString());
    
    try {
        const res = await fetch(`/api/flex-chart-data?${params}`);
        console.log('Response status:', res.status);
        
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${res.status}`);
        }
        
        const data = await res.json();
        console.log('Received data:', data.length, 'points');
        
        const sensors = [...form.querySelectorAll('[name="sensors"]:checked')].map(el => +el.value);
        const metrics = [...form.querySelectorAll('[name="metrics"]:checked')].map(el => el.value);
        
        buildChart(data, sensors, metrics);
    } catch (err) {
        console.error('Fetch error:', err);
        alert(`Ошибка: ${err.message}`);
    }
}

document.getElementById('chartForm').onsubmit = (e) => { 
    e.preventDefault(); 
    fetchData(); 
};

document.getElementById('btnExport').onclick = async () => {
    const form = document.getElementById('chartForm');
    const params = new URLSearchParams(new FormData(form));
    const res = await fetch(`/api/flex-chart-data?${params}`);
    const data = await res.json();
    
    if (!data.length) return alert('Нет данных для экспорта');
    
    const headers = ['timestamp', 'sensor_id', 'temperature', 'humidity'];
    const csv = [headers.join(';'), ...data.map(d => 
        [d.timestamp, d.sensor_id, d.temperature ?? '', d.humidity ?? ''].join(';')
    )].join('\n');
    
    const blob = new Blob([csv], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `export_${Date.now()}.txt`;
    a.click();
};

// Инициализация
window.onload = () => {
    console.log('Page loaded, initializing dates');
    const now = new Date(), yesterday = new Date(now - 24*60*60*1000);
    document.getElementById('dateTo').value = now.toISOString().slice(0,16);
    document.getElementById('dateFrom').value = yesterday.toISOString().slice(0,16);
    fetchData();
};
</script>
{% endblock %}
