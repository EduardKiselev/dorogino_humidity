{% extends "base.html" %}
{% block title %}Гибкий график{% endblock %}
{% block content %}
<div class="card mb-3">
  <div class="card-body">
    <form id="chartForm" class="row g-3">
      <div class="col-md-3">
        <label class="form-label">С даты</label>
        <input type="datetime-local" class="form-control" name="date_from" id="dateFrom" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">По дату</label>
        <input type="datetime-local" class="form-control" name="date_to" id="dateTo" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Сенсоры</label>
        <div class="border rounded p-2" style="max-height:100px;overflow-y:auto">
          {% for sid in sensor_ids %}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="sensors" value="{{ sid }}" id="sen{{ sid }}" checked>
            <label class="form-check-label" for="sen{{ sid }}">Датчик {{ sid }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Метрики</label>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="metrics" value="temperature" id="metTemp" checked>
          <label class="form-check-label" for="metTemp">Температура</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="metrics" value="humidity" id="metHum" checked>
          <label class="form-check-label" for="metHum">Влажность</label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Построить</button>
        <button type="button" class="btn btn-outline-secondary" id="btnExport">Экспорт CSV</button>
      </div>
    </form>
  </div>
</div>
<div style="width: 1200px; height: 500px; margin: 0 auto; position: relative;">
    <canvas id="flexChart" style="display: block; width: 100%; height: 100%;"></canvas>
</div>
{% endblock %}


{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const ctx = document.getElementById('flexChart');
let chart = null;
const colors = ['#e41a1c','#377eb8','#4daf4a','#984ea3','#ff7f00','#ffff33','#a65628','#f781bf'];

// Форматирование даты для тултипа
function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
}

function buildChart(data, sensors, metrics) {
    console.log('📊 Всего данных от API:', data.length);
    if (data.length > 0) {
        console.log('📅 Пример данных:', data[0]);
        console.log('📅 Timestamp первого:', data[0].timestamp);
        console.log('📅 Преобразованная дата:', new Date(data[0].timestamp));
    }
    
    if (chart) chart.destroy();
    
    const datasets = [];
    let colorIdx = 0;
    
        sensors.forEach(sid => {
            const sensorData = data.filter(d => d.sensor_id == sid);
            console.log(`🔍 Сенсор ${sid}: ${sensorData.length} точек`);
            
            metrics.forEach(metric => {
        const points = sensorData
            .filter(d => {
                const val = d[metric];
                return val !== null && val !== undefined && !isNaN(+val);
            })
            .map((d, idx) => {
                const dateObj = new Date(d.timestamp);
                const ts = dateObj.getTime();
                
                if (isNaN(ts)) {
                    console.warn(`❌ Invalid timestamp: "${d.timestamp}"`);
                    return null;
                }
                
                const point = { x: ts, y: +d[metric] };
                
                if (idx === 0 || idx === sensorData.length - 1) {
                    console.log(`📍 [${metric}] #${idx}: x=${ts} (${fmtDate(ts)}), y=${point.y}`);
                }
                return point;
            })
            .filter(p => p !== null); 
        
        console.log(`✅ ${metric}: ${points.length} валидных точек`);
        
        if (points.length) {
            console.log(`   📅 Диапазон: ${fmtDate(points[0].x)} — ${fmtDate(points[points.length-1].x)}`);
            const label = `Д${sid} ${metric === 'temperature' ? '🌡️' : '💧'}`;
            datasets.push({
                label,
                points,
                borderColor: colors[colorIdx % colors.length],
                tension: 0.2,
                pointRadius: 2,
                yAxisID: metric === 'temperature' ? 'yTemp' : 'yHum'
            });
            colorIdx++;
        }
    });
    });
    
    console.log('📈 Dataset' + (datasets.length > 0 ? 's' : '') + ':', datasets.length);
    
    if (datasets.length === 0) {
        alert('Нет данных для отображения. Проверьте консоль (F12)');
        return;
    }
    
    // Найдем реальный диапазон X
    const allX = datasets.flatMap(d => d.data.map(p => p.x));
    const minX = Math.min(...allX);
    const maxX = Math.max(...allX);
    console.log(`⏱️ Диапазон X: ${fmtDate(minX)} - ${fmtDate(maxX)}`);
    
    const padding = (maxX - minX) * 0.02 || 3600000;
    
    chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: {
                padding: { top: 10, right: 10, bottom: 10, left: 10 }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            scales: {
                x: {
                    type: 'linear',
                    min: minX - padding,
                    max: maxX + padding,
                    ticks: { 
                        callback: (val) => fmtDate(val),
                        maxTicksLimit: 10
                    },
                    title: { display: true, text: 'Время' }
                },
                yTemp: {
                    type: 'linear',
                    display: datasets.some(d => d.yAxisID === 'yTemp'),
                    position: 'left',
                    title: { display: true, text: 'Температура, °C' },
                    grid: { drawOnChartArea: false },
                    suggestedMin: 30,
                    suggestedMax: 42,
                    beginAtZero: false
                },
                yHum: {
                    type: 'linear',
                    display: datasets.some(d => d.yAxisID === 'yHum'),
                    position: 'right',
                    title: { display: true, text: 'Влажность, %' },
                    min: 20,
                    max: 60
                }
            },
            plugins: {
                legend: { position: 'bottom' },
                tooltip: {
                    callbacks: {
                        label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(1)}`,
                        title: (items) => fmtDate(items[0].parsed.x)
                    }
                }
            }
        }
    });
}

async function fetchData() {
    const form = document.getElementById('chartForm');
    const params = new URLSearchParams(new FormData(form));
    
    try {
        const res = await fetch(`/api/flex-chart-data?${params}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        
        const sensors = [...form.querySelectorAll('[name="sensors"]:checked')].map(el => +el.value);
        const metrics = [...form.querySelectorAll('[name="metrics"]:checked')].map(el => el.value);
        
        buildChart(data, sensors, metrics);
    } catch (err) {
        console.error(err);
        alert(`Ошибка: ${err.message}`);
    }
}

document.getElementById('chartForm').onsubmit = (e) => { e.preventDefault(); fetchData(); };

document.getElementById('btnExport').onclick = async () => {
    const form = document.getElementById('chartForm');
    const params = new URLSearchParams(new FormData(form));
    const res = await fetch(`/api/flex-chart-data?${params}`);
    const data = await res.json();
    if (!data.length) return alert('Нет данных');
    
    const headers = ['timestamp', 'sensor_id', 'temperature', 'humidity'];
    const csv = [headers.join(';'), ...data.map(d => 
        [d.timestamp, d.sensor_id, d.temperature ?? '', d.humidity ?? ''].join(';')
    )].join('\n');
    
    const blob = new Blob([csv], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `export_${Date.now()}.txt`;
    a.click();
};

// Инициализация
window.onload = () => {
    const now = new Date(), yesterday = new Date(now - 24*60*60*1000);
    document.getElementById('dateTo').value = now.toISOString().slice(0,16);
    document.getElementById('dateFrom').value = yesterday.toISOString().slice(0,16);
    fetchData();
};
</script>
{% endblock %}
