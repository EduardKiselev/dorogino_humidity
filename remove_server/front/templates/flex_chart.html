{% extends "base.html" %}
{% block title %}Гибкий график{% endblock %}
{% block content %}
<div class="card mb-3">
  <div class="card-body">
    <form id="chartForm" class="row g-3">
        <div class="col-md-3">
            <label class="form-label">С даты</label>
            <div class="input-group">
                <input type="date" class="form-control" id="dateFromDate" required>
                <input type="time" class="form-control" id="dateFromTime" required step="60">
            </div>
        </div>
        <div class="col-md-3">
            <label class="form-label">По дату</label>
            <div class="input-group">
                <input type="date" class="form-control" id="dateToDate" required>
                <input type="time" class="form-control" id="dateToTime" required step="60">
            </div>
        </div>
      <div class="col-md-3">
        <label class="form-label">Сенсоры</label>
        <div class="border rounded p-2" style="max-height:100px;overflow-y:auto">
          {% for sid in sensor_ids %}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="sensors" value="{{ sid }}" id="sen{{ sid }}" checked>
            <label class="form-check-label" for="sen{{ sid }}">Датчик {{ sid }}</label>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Метрики</label>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="metrics" value="temperature" id="metTemp" checked>
          <label class="form-check-label" for="metTemp">Температура</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="metrics" value="humidity" id="metHum" checked>
          <label class="form-check-label" for="metHum">Влажность</label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Построить</button>
        <button type="button" class="btn btn-outline-secondary" id="btnExport">Экспорт CSV</button>
      </div>
    </form>
  </div>
</div>
<div style="width: 1200px; height: 500px; margin: 0 auto; position: relative;">
    <canvas id="flexChart" style="display: block; width: 100%; height: 100%;"></canvas>
</div>
{% endblock %}


{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const ctx = document.getElementById('flexChart');
let chart = null;
const colors = ['#e41a1c','#377eb8','#4daf4a','#984ea3','#ff7f00','#ffff33','#a65628','#f781bf'];

function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
}

function buildChart(data, sensors, metrics) {
    if (chart) chart.destroy();
    
    const datasets = [];
    
    sensors.forEach(sid => {
        const sensorData = data.filter(d => d.sensor_id == sid);
        
        metrics.forEach(metric => {
            const points = sensorData
                .filter(d => {
                    const val = d[metric];
                    return val !== null && val !== undefined && !isNaN(+val);
                })
                .map(d => {
                    const ts = new Date(d.timestamp).getTime();
                    if (isNaN(ts)) return null;
                    return { x: ts, y: +d[metric] };
                })
                .filter(p => p !== null);
            
            if (points.length) {
                const metricName = metric === 'temperature' ? 'Температура' : 'Влажность';
                const label = `Д${sid} — ${metricName}`;
                const sensorColor = colors[(sid - 1) % colors.length];
                
                datasets.push({
                    label: label,
                    data: points,
                    borderColor: sensorColor,
                    tension: 0.2,
                    pointRadius: 2,
                    borderDash: metric === 'temperature' ? [6, 4] : [],
                    yAxisID: metric === 'temperature' ? 'yTemp' : 'yHum'
                });
            }
        });
    });
    
    if (datasets.length === 0) {
        alert('Нет данных для отображения');
        return;
    }
    
    // Расчёт диапазона X
    const allX = [];
    for (const ds of datasets) {
        if (ds.data && Array.isArray(ds.data)) {
            for (const point of ds.data) {
                if (point.x !== null && !isNaN(point.x)) {
                    allX.push(point.x);
                }
            }
        }
    }
    
    if (allX.length === 0) {
        console.error('❌ Не найдено валидных точек для оси X');
        return;
    }
    
    const minX = Math.min(...allX);
    const maxX = Math.max(...allX);
    const padding = (maxX - minX) * 0.02 || 3600000;
    
    chart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { top: 10, right: 10, bottom: 10, left: 10 } },
            
            // 👇 Показывать все датасеты при наведении на временную точку
            interaction: { 
                mode: 'index', 
                intersect: false,
                axis: 'x'
            },
            
            scales: {
                x: {
                    type: 'linear',
                    min: minX - padding,
                    max: maxX + padding,
                    ticks: { 
                        callback: (val) => fmtDate(val),
                        maxTicksLimit: 10
                    },
                    title: { display: true, text: 'Время' }
                },
                yTemp: {
                    type: 'linear',
                    display: datasets.some(d => d.yAxisID === 'yTemp'),
                    position: 'left',
                    title: { display: true, text: 'Температура, °C' },
                    grid: { drawOnChartArea: false },
                    min: 30,
                    max: 42,
                    beginAtZero: false
                },
                yHum: {
                    type: 'linear',
                    display: datasets.some(d => d.yAxisID === 'yHum'),
                    position: 'right',
                    title: { display: true, text: 'Влажность, %' },
                    min: 20,
                    max: 60
                }
            },
            plugins: {
                legend: { position: 'bottom' },
                tooltip: {
                    mode: 'index',
                    intersect: false,
                    // 👇 Фиксируем позицию
                    position: function(context, eventPosition) {
                        return { x: 15, y: 15 };  // 15px от левого верхнего угла
                    },
                    backgroundColor: 'rgba(255, 255, 255, 0.95)',
                    titleColor: '#000',
                    bodyColor: '#000',
                    borderColor: '#dee2e6',
                    borderWidth: 1,
                    padding: 10,
                    callbacks: {
                        title: (items) => items.length ? fmtDate(items[0].parsed.x) : '',
                        label: (ctx) => {
                            const label = ctx.dataset.label || '';
                            const value = ctx.parsed.y;
                            return value !== null && value !== undefined 
                                ? `${label}: ${value.toFixed(1)}` 
                                : null;
                        },
                        itemSort: (a, b) => (a.dataset.label || '').localeCompare(b.dataset.label || '')
                    }
                }
            }
        }
    });
}

async function fetchData() {
    const form = document.getElementById('chartForm');
    
    // 👇 Собираем из раздельных полей
    const dateFrom = document.getElementById('dateFromDate').value;
    const timeFrom = document.getElementById('dateFromTime').value;
    const dateTo = document.getElementById('dateToDate').value;
    const timeTo = document.getElementById('dateToTime').value;
    
    if (!dateFrom || !timeFrom || !dateTo || !timeTo) {
        alert('Заполните все поля даты и времени');
        return;
    }
    
    const params = new URLSearchParams();
    params.set('date_from', `${dateFrom}T${timeFrom}`);
    params.set('date_to', `${dateTo}T${timeTo}`);
    
    // Добавляем чекбоксы
    const sensors = [...form.querySelectorAll('[name="sensors"]:checked')].map(el => +el.value);
    const metrics = [...form.querySelectorAll('[name="metrics"]:checked')].map(el => el.value);
    sensors.forEach(s => params.append('sensors', s));
    metrics.forEach(m => params.append('metrics', m));
    
    try {
        const res = await fetch(`/api/flex-chart-data?${params}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        buildChart(data, sensors, metrics);
    } catch (err) {
        console.error('Fetch error:', err);
        alert(`Ошибка: ${err.message}`);
    }
}

// Инициализация: устанавливаем значения и формат 24ч
window.onload = () => {
    const now = new Date();
    const yesterday = new Date(now - 24*60*60*1000);
    
    // date input: YYYY-MM-DD
    document.getElementById('dateFromDate').value = formatDateISO(yesterday);
    document.getElementById('dateToDate').value = formatDateISO(now);
    
    // time input: HH:MM (24-часовой формат)
    document.getElementById('dateFromTime').value = formatTime24(yesterday);
    document.getElementById('dateToTime').value = formatTime24(now);
    
    fetchData();
};

function formatDateISO(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

function formatTime24(date) {
    const h = String(date.getHours()).padStart(2, '0');
    const min = String(date.getMinutes()).padStart(2, '0');
    return `${h}:${min}`;
}


document.getElementById('chartForm').onsubmit = (e) => { e.preventDefault(); fetchData(); };

document.getElementById('btnExport').onclick = async () => {
    const form = document.getElementById('chartForm');
    const params = new URLSearchParams(new FormData(form));
    const res = await fetch(`/api/flex-chart-data?${params}`);
    const data = await res.json();
    if (!data.length) return alert('Нет данных');
    
    const headers = ['timestamp', 'sensor_id', 'temperature', 'humidity'];
    const csv = [headers.join(';'), ...data.map(d => 
        [d.timestamp, d.sensor_id, d.temperature ?? '', d.humidity ?? ''].join(';')
    )].join('\n');
    
    const blob = new Blob([csv], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `export_${Date.now()}.txt`;
    a.click();
};

// Инициализация
window.onload = () => {
    const now = new Date();
    const yesterday = new Date(now - 24*60*60*1000);
    document.getElementById('dateTo').value = formatForInput(now);
    document.getElementById('dateFrom').value = formatForInput(yesterday);


    fetchData();
};

function formatForInput(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    return `${year}-${month}-${day}T${hours}:${minutes}`;
}

</script>
{% endblock %}
