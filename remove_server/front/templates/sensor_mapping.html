{% extends "base.html" %}
{% block title %}Расположение датчиков{% endblock %}
{% block content %}
<h3>📍 Датчики и их локации</h3>

<div class="card">
  <div class="card-body p-0">
    <table class="table table-striped mb-0">
      <thead class="table-light">
        <tr>
          <th style="width:80px">ID</th>
          <th>Место установки</th>
        </tr>
      </thead>
      <tbody>
        {% for s in sensors %}
        <tr>
          <td><strong>{{ s.id }}</strong></td>
          <td>{{ s.desc }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<div class="mt-3">
  <a href="{{ url_for('workshop_diagram') }}" class="btn btn-outline-primary btn-sm">
    🗺️ На схему цеха
  </a>
  {% if is_admin %}
  <a href="{{ url_for('manage_sensor_locations') }}" class="btn btn-outline-secondary btn-sm">
    ⚙️ Настроить координаты
  </a>
  {% endif %}
</div>
{% endblock %}
